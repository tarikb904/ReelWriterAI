+    <script>
+      // Prevent flash of unstyled content (FOUC) for theme
+      (function() {
+        const theme = localStorage.getItem('reelwriter-theme') || 'system';
+        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
+        const shouldUseDark = theme === 'dark' || (theme === 'system' && systemPrefersDark);
+        
+        if (shouldUseDark) {
+          document.documentElement.classList.add('dark');
+          document.querySelector('meta[name="theme-color"]')?.setAttribute('content', '#1f2937');
+        } else {
+          document.documentElement.classList.add('light');
+        }
+      })();
+    </script>
